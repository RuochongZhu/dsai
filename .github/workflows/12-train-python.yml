name: Model Training Job (Python)

on:
  schedule:
    - cron: '0 7 * * 1'   # weekly on Mondays at 7am UTC
  workflow_dispatch:        # allow manual trigger

jobs:
  train_python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-train-${{ hashFiles('.github/workflows/12-train-python.yml', '12_end/02_train_model.py') }}
          restore-keys: |
            ${{ runner.os }}-pip-train-
            ${{ runner.os }}-pip-
      - name: Install dependencies
        run: pip install pandas xgboost numpy
      - name: Run training script (Python)
        working-directory: 12_end
        run: python 02_train_model.py
      - name: Upload model artifact (Python)
        uses: actions/upload-artifact@v4
        with:
          name: xgboost-model-python
          path: 12_end/data/model.json
