name: Traffic Data Ingestion (Python)

on:
  schedule:
    - cron: '*/15 * * * *' # every 15 minutes
  workflow_dispatch:

jobs:
  ingest_python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-ingest-${{ hashFiles('.github/workflows/12-ingest-python.yml', '12_end/01_ingest_traffic.py') }}
          restore-keys: |
            ${{ runner.os }}-pip-ingest-
            ${{ runner.os }}-pip-
      - name: Install Python dependencies
        run: pip install requests pandas
      - name: Run Brussels ingestion script (Python)
        working-directory: 12_end
        run: python 01_ingest_traffic.py
