name: Traffic Data Ingestion Job (R)

on:
  schedule:
    - cron: '*/15 * * * *' # every 15 minutes
  workflow_dispatch:

jobs:
  ingest_r:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
      - name: Set user library path for cache
        run: echo "R_LIBS_USER=${HOME}/.cache/R/gha-library" >> $GITHUB_ENV
      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-lib-ingest-${{ hashFiles('.github/workflows/12-ingest-r.yml', '12_end/01_ingest_traffic.R') }}
          restore-keys: |
            ${{ runner.os }}-r-lib-ingest-
            ${{ runner.os }}-r-lib-
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::httr2
            any::dplyr
            any::tibble
            any::purrr
            any::lubridate
            any::DBI
            any::RSQLite

      - name: Run Brussels ingestion script (R)
        working-directory: 12_end
        run: Rscript 01_ingest_traffic.R

      - name: Commit updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 12_end/data/traffic.db
          git diff --cached --quiet || git commit -m "chore: ingest brussels traffic data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
