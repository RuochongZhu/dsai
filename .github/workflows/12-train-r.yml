name: Model Training Job (R)

on:
  schedule:
    - cron: '0 7 * * 1'   # weekly on Mondays at 7am UTC
  workflow_dispatch:        # allow manual trigger

jobs:
  train_r:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - name: Set user library path for cache
        run: echo "R_LIBS_USER=${HOME}/.cache/R/gha-library" >> $GITHUB_ENV
      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-lib-train-${{ hashFiles('.github/workflows/12-train-r.yml', '12_end/02_train_model.R') }}
          restore-keys: |
            ${{ runner.os }}-r-lib-train-
            ${{ runner.os }}-r-lib-
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::DBI
            any::RSQLite
            any::dplyr
            any::lubridate
            any::xgboost
      - name: Run training script (R)
        working-directory: 12_end
        run: Rscript 02_train_model.R
      - name: Upload model artifact (R)
        uses: actions/upload-artifact@v4
        with:
          name: xgboost-model-r
          path: 12_end/data/model.json
